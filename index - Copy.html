<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOCLA - The Coder's Way</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. พื้นหลังสีขาวสะอาดตา */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; font-family: 'Sarabun', sans-serif;
            position: relative;
        }

        /* 2. วงกลมประดับหลังฉากสีพาสเทลจางๆ */
        .circle {
            position: fixed;
            background: linear-gradient(135deg, rgba(224, 195, 252, 0.15), rgba(142, 197, 252, 0.15));
            border-radius: 50%;
            z-index: -1;
        }

        .logo-container {
            perspective: 1500px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3. ตัวโลโก้หลัก: เพิ่มเงา Drop Shadow ให้ดูมีมิติคมชัด */
        .main-logo {
           width: 80vw;       /* ให้กว้าง 80% ของความกว้างหน้าจอ */
           max-width: 350px;  /* แต่ห้ามใหญ่เกิน 350px (ขนาดที่คุณครูชอบ) */
            height: auto;     /* บังคับให้ความสูงปรับตามความกว้างอัตโนมัติ เพื่อไม่ให้รูปเบี้ยว */
            opacity: 0;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            animation: flipAndZoomIn 3.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            position: relative;
            z-index: 2;
        }

        /* 4. เอฟเฟกต์แสงวิ่งเป็นวงกลม (เห็นชัดบนพื้นขาว) */
        .logo-container::before {
            content: "";
            position: absolute;
           // width: 380px; 
            //height: 380px;
	width: 90vw;
 	   height: 90vw;
 	   max-width: 380px;
 	   max-height: 380px;
            border-radius: 50%;
            /* ใช้สีฟ้า Ice Blue ตัดกับพื้นขาว */
            border: 10px solid transparent;
            border-top: 10px solid #00d4ff; 
            border-right: 10px solid rgba(0, 212, 255, 0.3);
            /* เพิ่มความเรืองแสงให้ดูสว่างวาบ */
            filter: blur(4px) drop-shadow(0 0 15px rgba(0, 212, 255, 0.6));
            animation: circularLightSweep 1.5s linear infinite;
            opacity: 0;
            z-index: 1;
        }

        /* 5. เอฟเฟกต์แสงขาววิ่งผ่านตัวโลโก้ (Crystal Sweep) */
        .logo-container::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 40%; height: 100%;
            /* ใช้ Gradient สีขาวสลับฟ้าเพื่อให้เห็นบนพื้นขาว */
            background: linear-gradient(90deg, 
                transparent, 
                rgba(0, 212, 255, 0.2), 
                rgba(255, 255, 255, 1), 
                rgba(0, 212, 255, 0.2), 
                transparent);
            transform: skewX(-30deg);
            animation: lightSweep 3s infinite;
            z-index: 3;
        }

        /* ให้แสงเริ่มทำงานเมื่อโลโก้มาถึงจุดที่ต้องการ */
        .logo-container.active::before {
            opacity: 1;
            transition: opacity 1s ease;
        }

        /* แอนิเมชันต่างๆ */
        @keyframes circularLightSweep {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes lightSweep {
            0% { left: -120%; }
            100% { left: 250%; }
        }

        @keyframes flipAndZoomIn {
            0% { transform: scale(0) rotateY(-180deg); opacity: 0; }
            30% { transform: scale(1.1) rotateY(360deg); opacity: 1; }
            60% { transform: scale(1.0) rotateY(720deg); opacity: 1; }
            85% { transform: scale(1.3) rotateY(1080deg); opacity: 1; }
            100% { transform: scale(1.5) rotateY(1080deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="logo-container" id="logoContainer">
        <img src="logo.png" alt="Logo" class="main-logo">
    </div>

    <script>
        // เปิดใช้งานแสงวิ่งหลังจากโลโก้เริ่มโชว์ตัว
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('logoContainer').classList.add('active');
            }, 1000); 
        });

        // สร้างดวงดาว/วงกลมจางๆ หลังฉาก
        for (let i = 0; i < 20; i++) {
            let circle = document.createElement('div');
            circle.className = 'circle';
            let size = Math.random() * 60 + 20 + 'px';
            circle.style.width = size;
            circle.style.height = size;
            circle.style.top = Math.random() * 100 + 'vh';
            circle.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(circle);
        }

        // เปลี่ยนหน้าอัตโนมัติ
        setTimeout(() => {
            window.location.href = "main.html"; 
        }, 3800);
    </script>
</body>
</html>
