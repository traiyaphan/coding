<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOCLA - The Coder's Way</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* --- โครงสร้างและดีไซน์เดิมของคุณครู --- */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #ffffff; display: flex; justify-content: center; align-items: center; overflow: hidden; font-family: 'Sarabun', sans-serif; position: relative; }
        .circle { position: fixed; background: linear-gradient(135deg, rgba(224, 195, 252, 0.15), rgba(142, 197, 252, 0.15)); border-radius: 50%; z-index: -1; }
        .logo-container { perspective: 1500px; position: relative; display: flex; justify-content: center; align-items: center; }
        .main-logo { width: 350px; height: auto; opacity: 0; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); animation: flipAndZoomIn 3.8s cubic-bezier(0.19, 1, 0.22, 1) forwards; position: relative; z-index: 2; }
        .logo-container::before { content: ""; position: absolute; width: 380px; height: 380px; border-radius: 50%; border: 10px solid transparent; border-top: 10px solid #00d4ff; border-right: 10px solid rgba(0, 212, 255, 0.3); filter: blur(4px) drop-shadow(0 0 15px rgba(0, 212, 255, 0.6)); animation: circularLightSweep 1.5s linear infinite; opacity: 0; z-index: 1; }
        .logo-container::after { content: ""; position: absolute; top: 0; left: -100%; width: 40%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.2), rgba(255, 255, 255, 1), rgba(0, 212, 255, 0.2), transparent); transform: skewX(-30deg); animation: lightSweep 3s infinite; z-index: 3; }
        .logo-container.active::before { opacity: 1; transition: opacity 1s ease; }

        @keyframes circularLightSweep { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes lightSweep { 0% { left: -120%; } 100% { left: 250%; } }
        @keyframes flipAndZoomIn { 0% { transform: scale(0) rotateY(-180deg); opacity: 0; } 30% { transform: scale(1.1) rotateY(360deg); opacity: 1; } 60% { transform: scale(1.0) rotateY(720deg); opacity: 1; } 85% { transform: scale(1.3) rotateY(1080deg); opacity: 1; } 100% { transform: scale(1.5) rotateY(1080deg); opacity: 0; } }

        /* --- ส่วนเพิ่มเติม: วิดีโอและปุ่มกดหรู --- */
        #videoLayer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: contain; }

        .start-btn-custom {
            position: fixed; z-index: 10001; padding: 20px 50px; font-size: 24px; font-family: 'Sarabun';
            color: #fff; background: transparent; border: 2px solid #00d4ff; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 3px; transition: all 0.4s;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); text-shadow: 0 0 10px #00d4ff;
        }
        .start-btn-custom:hover { background: #00d4ff; color: #000; box-shadow: 0 0 40px #00d4ff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="logo-container" id="logoContainer">
        <img src="logo.png" alt="Logo" class="main-logo">
    </div>

    <div id="videoLayer">
        <video id="introVideo" playsinline>
            <source src="sounds/intro.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        // แอนิเมชันเดิมทำงาน
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('logoContainer').classList.add('active'); }, 1000);
        });

        // สร้างวงกลมพื้นหลัง
        for (let i = 0; i < 20; i++) {
            let circle = document.createElement('div');
            circle.className = 'circle';
            let size = Math.random() * 60 + 20 + 'px';
            circle.style.width = size; circle.style.height = size;
            circle.style.top = Math.random() * 100 + 'vh'; circle.style.left = Math.random() * 100 + 'vw';
            document.body.appendChild(circle);
        }

        // เมื่อแอนิเมชันโลโก้จบ (3.8 วินาที)
        setTimeout(() => {
            const videoLayer = document.getElementById('videoLayer');
            const video = document.getElementById('introVideo');
            
            videoLayer.style.display = 'flex';
            
            // ลองเล่นอัตโนมัติ ถ้าติดกฎเบราว์เซอร์จะแสดงปุ่มหรูให้กด
            video.play().catch(() => {
                const btn = document.createElement('button');
                btn.innerHTML = "เข้าสู่ภารกิจ 🚀";
                btn.className = "start-btn-custom";
                btn.onclick = () => { video.play(); btn.style.display = 'none'; };
                document.body.appendChild(btn);
            });

            video.onended = () => { window.location.href = "main.html"; };
        }, 3800);
    </script>
</body>
</html>
